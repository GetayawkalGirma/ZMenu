name: Telegram Seeder

on:
  schedule:
    # Every 3 hours
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Run only this channel (leave blank for all)"
        required: false
        default: ""

jobs:
  seed:
    name: Seed @${{ matrix.channel }}
    runs-on: ubuntu-latest
    strategy:
      # Run channels one at a time to avoid Telegram rate limits
      max-parallel: 1
      matrix:
        channel:
          - shegergebeta
          - Foodism11
          # Add more channels here
    # If a specific channel was requested via manual trigger, skip the others
    if: >
      github.event.inputs.channel == '' ||
      github.event.inputs.channel == matrix.channel

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run seeder for @${{ matrix.channel }}
        run: npx tsx scripts/seeder/seeder.ts ${{ matrix.channel }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_2: ${{ secrets.GOOGLE_API_KEY_2 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
